{% extends 'base.html' %}

{% block title %}Delete Profile{% endblock %}

{% block content %}

<h2>Are you sure you want to delete?</h2>

<p><b>{{ profile.name }}</b> ({{ profile.role }})</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
</form>

<br>

<a href="{% url 'home' %}">Cancel</a>

{% endblock %}
