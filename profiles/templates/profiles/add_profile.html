{% extends 'base.html' %}

{% block title %}Add Profile{% endblock %}

{% block content %}

<h2>Add New Profile</h2>

<form method="POST">
    {% csrf_token %}

    {{ form.as_p }}

    {% if form.instance.pk %}
        <button type="submit">Update Profile</button>
    {% else %}
        <button type="submit">Save Profile</button>
    {% endif %}
    
</form>

{% endblock %}
