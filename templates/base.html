{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Profile Manager{% endblock %}</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

    <nav>
        <a href="{% url 'home' %}">Home</a> |
        <a href="{% url 'add_profile' %}">Add Profile</a>
    </nav>

    <hr>

    {% if messages %}
        {% for message in messages %}
            <p style="color: green; font-weight: bold;">
                {{ message }}
            </p>
        {% endfor %}
    {% endif %}

    {% block content %}
    {% endblock %}

</body>
</html>
